<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}SiPakar Diet IMT{% endblock %} — Sistem Pakar Diet Sehat</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter (body) + DM Serif Display (headings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans:    ['Inter', 'sans-serif'],
              display: ['"DM Serif Display"', 'serif'],
            },
            colors: {
              medical: {
                50:  '#f0fdf8',
                100: '#dcfcee',
                200: '#baf7de',
                300: '#84efbf',
                400: '#47df9a',
                500: '#1ec97a',   /* Primary green */
                600: '#12a862',
                700: '#108550',
                800: '#116941',
                900: '#0f5636',
              },
              sky: {
                50:  '#f0f9ff',
                100: '#e0f2fe',
                400: '#38bdf8',
                500: '#0ea5e9',
                600: '#0284c7',
                700: '#0369a1',
              },
              slate: {
                50:  '#f8fafc',
                100: '#f1f5f9',
                200: '#e2e8f0',
                300: '#cbd5e1',
                400: '#94a3b8',
                500: '#64748b',
                600: '#475569',
                700: '#334155',
                800: '#1e293b',
                900: '#0f172a',
              }
            },
            boxShadow: {
              'card': '0 1px 3px 0 rgba(0,0,0,.06), 0 4px 16px 0 rgba(0,0,0,.06)',
              'card-hover': '0 4px 6px -1px rgba(0,0,0,.07), 0 10px 30px -3px rgba(0,0,0,.10)',
            }
          }
        }
      }
    </script>

    <style>
      /* ── Global resets ── */
      *, *::before, *::after { box-sizing: border-box; }
      body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
      .font-display { font-family: 'DM Serif Display', serif; }

      /* ── Sidebar nav link active state ── */
      .nav-link.active { background-color: #f0fdf8; color: #12a862; font-weight: 600; }
      .nav-link.active .nav-icon { color: #12a862; }
      .nav-link:not(.active):hover { background-color: #f8fafc; }

      /* ── Flash messages ── */
      .flash-success { background:#f0fdf8; border-left:4px solid #1ec97a; color:#0f5636; }
      .flash-danger  { background:#fff1f2; border-left:4px solid #f43f5e; color:#881337; }
      .flash-warning { background:#fffbeb; border-left:4px solid #f59e0b; color:#78350f; }
      .flash-info    { background:#f0f9ff; border-left:4px solid #0ea5e9; color:#0c4a6e; }

      /* ── Custom scrollbar ── */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      /* ── Table hover ── */
      .table-row:hover { background-color: #f8fafc; }

      /* ── Gradient badge ── */
      .badge-kurus      { background:#eff6ff; color:#1d4ed8; }
      .badge-normal     { background:#f0fdf4; color:#166534; }
      .badge-overweight { background:#fefce8; color:#854d0e; }
      .badge-obesitas1  { background:#fff7ed; color:#9a3412; }
      .badge-obesitas2  { background:#fff1f2; color:#881337; }

      /* ── Animated gradient for hero ── */
      .hero-gradient {
        background: linear-gradient(135deg, #0f172a 0%, #0f5636 50%, #0369a1 100%);
      }

      /* ── Pulse dot indicator ── */
      .pulse-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #1ec97a;
        box-shadow: 0 0 0 0 rgba(30,201,122,0.4);
        animation: pulse-ring 2s infinite;
      }
      @keyframes pulse-ring {
        0%   { box-shadow: 0 0 0 0 rgba(30,201,122,0.4); }
        70%  { box-shadow: 0 0 0 8px rgba(30,201,122,0); }
        100% { box-shadow: 0 0 0 0 rgba(30,201,122,0); }
      }

      /* ── Form focus rings ── */
      input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #1ec97a;
        box-shadow: 0 0 0 3px rgba(30,201,122,0.15);
      }

      /* ── BMI gauge bar ── */
      .bmi-bar { height: 8px; border-radius: 999px; overflow: hidden; }
      .bmi-fill { height: 100%; border-radius: 999px; transition: width 1s ease; }

      /* ── Print hide ── */
      @media print { .no-print { display: none !important; } }

      /* ── Sidebar transition ── */
      .sidebar { transition: transform 0.3s ease; }

      /* ── Card entrance animation ── */
      @keyframes fadeUp {
        from { opacity:0; transform:translateY(12px); }
        to   { opacity:1; transform:translateY(0); }
      }
      .fade-up { animation: fadeUp 0.4s ease both; }
      .fade-up-delay-1 { animation-delay: 0.05s; }
      .fade-up-delay-2 { animation-delay: 0.10s; }
      .fade-up-delay-3 { animation-delay: 0.15s; }
      .fade-up-delay-4 { animation-delay: 0.20s; }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="antialiased">

{% block body %}{% endblock %}

<!-- ── Global JS utilities ── -->
<script>
  /* Flash message auto-dismiss */
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.flash-msg').forEach(el => {
      setTimeout(() => {
        el.style.transition = 'opacity 0.5s ease';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 500);
      }, 5000);
    });

    /* Mobile sidebar toggle */
    const toggleBtn = document.getElementById('sidebarToggle');
    const sidebar   = document.getElementById('appSidebar');
    const overlay   = document.getElementById('sidebarOverlay');

    if (toggleBtn && sidebar) {
      toggleBtn.addEventListener('click', () => {
        sidebar.classList.toggle('-translate-x-full');
        overlay && overlay.classList.toggle('hidden');
      });
      overlay && overlay.addEventListener('click', () => {
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
      });
    }
  });
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
